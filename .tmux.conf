# Managed via github.com/wtobey/dotfiles — install.sh symlinks this to ~/.tmux.conf
# on every Coder workspace start.

# Plugins (managed by TPM).
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Where resurrect saves session snapshots. In Coder devcontainers ~/.tmux is wiped on
# every restart, so install.sh writes the persistent path (under /workspaces) here.
# -q so a fresh checkout without this file doesn't error.
source-file -q ~/.tmux/resurrect-dir.conf

# Auto-restore the last saved session when the tmux server starts; autosave every
# 15 minutes via continuum.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Initialize TPM. Keep this as the LAST line of the file.
run '~/.tmux/plugins/tpm/tpm'
